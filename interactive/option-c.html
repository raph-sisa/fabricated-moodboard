<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabricated — Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #D4A55A;
    --primary-dim: rgba(212,165,90,0.12);
    --secondary: #5A8A8A;
    --accent: #B87333;
    --bg: #060604;
    --surface: #0e0e0c;
    --surface-2: #141412;
    --text: #E8E4DC;
    --text-2: #8F837A;
    --text-3: #5A5650;
    --text-4: #3A3835;
    --border: #1E1E1C;
    --border-dim: #161614;
    --success: #6ACD6A;
    --error: #CD6464;
  }

  body {
    background: #020201;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, rgba(212,165,90,0.015) 0%, transparent 70%);
    pointer-events: none;
  }

  .terminal {
    position: relative; z-index: 1;
    width: 100%; max-width: 960px;
    min-height: calc(100vh - 2.5rem);
    display: flex; flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 100px rgba(0,0,0,0.7), 0 0 1px rgba(212,165,90,0.08),
      inset 0 1px 0 rgba(255,255,255,0.02);
    background: var(--bg);
  }

  /* Title bar */
  .titlebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; user-select: none;
  }
  .titlebar-dots { display: flex; gap: 7px; }
  .tdot { width: 12px; height: 12px; border-radius: 50%; }
  .tdot-r { background: #FF5F57; } .tdot-y { background: #FFBD2E; } .tdot-g { background: #28C840; }
  .titlebar-center { font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.08em; }
  .titlebar-theme {
    font-size: 0.5rem; color: var(--text-4);
    display: flex; align-items: center; gap: 0.35rem; cursor: pointer;
  }
  .theme-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 4px rgba(212,165,90,0.3); }

  /* Body */
  .body {
    flex: 1; overflow-y: auto; padding: 0;
    font-size: 0.76rem; line-height: 1.7;
    scroll-behavior: smooth;
  }

  #output { padding: 1.25rem 1.5rem 0; }

  /* Input area */
  .input-area {
    padding: 0 1.5rem 1.25rem;
    display: flex; align-items: center;
    position: sticky; bottom: 0;
    background: var(--bg);
  }
  .input-prompt { color: var(--secondary); margin-right: 0.4rem; white-space: nowrap; }
  #cmd-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: inherit; font-size: inherit;
    caret-color: var(--primary);
  }

  /* Status bar */
  .statusbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.3rem 0.85rem;
    display: flex; justify-content: space-between;
    font-size: 0.5rem; color: var(--text-4);
    flex-shrink: 0; user-select: none;
  }
  .statusbar-left, .statusbar-right { display: flex; align-items: center; gap: 1.25rem; }
  .status-item { display: flex; align-items: center; gap: 0.3rem; }
  .status-dot {
    width: 3px; height: 3px; border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .status-dot-amber { background: var(--primary); box-shadow: 0 0 3px var(--primary); }
  .status-dot-teal { background: var(--secondary); box-shadow: 0 0 3px var(--secondary); }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
  @keyframes blink { 50%{opacity:0} }

  /* Output element styles */
  .ln { margin-bottom: 0.08rem; white-space: pre-wrap; }
  .blank { height: 0.55rem; }
  .prompt-text { color: var(--secondary); }
  .cmd-text { color: var(--text); font-weight: 500; }
  .out { color: var(--text-2); }
  .hi { color: var(--primary); }
  .teal { color: var(--secondary); }
  .copper { color: var(--accent); }
  .dim { color: var(--text-3); }
  .dim2 { color: var(--text-4); }
  .bold { font-weight: 600; color: var(--text); }
  .ok { color: var(--success); }
  .err { color: var(--error); }

  .ascii { font-size: 0.55rem; line-height: 1.1; color: var(--primary); opacity: 0.8; white-space: pre; }

  .box {
    border: 1px solid var(--border); border-radius: 4px;
    margin: 0.5rem 0; overflow: hidden;
  }
  .box-header {
    background: var(--surface); border-bottom: 1px solid var(--border-dim);
    padding: 0.4rem 0.85rem; font-size: 0.45rem;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3);
  }
  .box-body { padding: 0.85rem; }

  .tbl-row { display: flex; margin-bottom: 0.1rem; }
  .tbl-key { width: 140px; color: var(--text-3); flex-shrink: 0; }
  .tbl-val { color: var(--text); }

  .card-grid { display: grid; gap: 0.6rem; margin: 0.5rem 0; }
  .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card-grid-2 { grid-template-columns: 1fr 1fr; }

  .card {
    border: 1px solid var(--border); border-radius: 4px;
    overflow: hidden; cursor: pointer; transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(212,165,90,0.25); }
  .card-top {
    background: #000; padding: 0.85rem;
    border-bottom: 1px solid var(--border-dim);
    min-height: 80px; display: flex;
    align-items: center; justify-content: center;
  }
  .card-bottom { padding: 0.75rem 0.85rem; }
  .card-title { font-size: 0.75rem; font-weight: 500; margin-bottom: 0.25rem; }
  .card-desc { font-size: 0.6rem; color: var(--text-3); line-height: 1.5; }
  .card-ascii { font-size: 0.45rem; line-height: 1.1; text-align: center; opacity: 0.5; white-space: pre; }
  .card-tag {
    font-size: 0.45rem; color: var(--text-4);
    border: 1px solid var(--border-dim);
    padding: 0.08rem 0.35rem; border-radius: 2px; margin-left: 0.4rem;
  }

  .progress { display: flex; align-items: center; gap: 0.6rem; margin: 0.25rem 0; }
  .progress-label { font-size: 0.6rem; color: var(--text-3); width: 100px; }
  .progress-track { width: 180px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s; }
  .progress-pct { font-size: 0.6rem; color: var(--text-3); }

  .oled-inset {
    background: #000; border: 1px solid var(--border-dim); border-radius: 3px;
    padding: 0.6rem 0.85rem; margin: 0.5rem 0;
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }
  .oled-title {
    font-family: 'VT323', monospace; font-size: 1rem;
    color: var(--primary); text-shadow: 0 0 6px rgba(212,165,90,0.4);
    letter-spacing: 0.1em;
  }

  .help-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin: 0.5rem 0; }
  .help-group { border: 1px solid var(--border-dim); border-radius: 3px; padding: 0.75rem; }
  .help-group-title {
    font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-4); margin-bottom: 0.5rem; padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border-dim);
  }
  .help-row { display: flex; justify-content: space-between; margin-bottom: 0.15rem; }
  .help-cmd { color: var(--primary); font-size: 0.68rem; }
  .help-desc { color: var(--text-3); font-size: 0.6rem; }

  .themes { display: flex; gap: 0.5rem; margin: 0.3rem 0; flex-wrap: wrap; }
  .theme-btn {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0.65rem; border: 1px solid var(--border);
    border-radius: 3px; font-size: 0.6rem; color: var(--text-2);
    cursor: pointer; transition: all 0.2s; background: none;
    font-family: inherit;
  }
  .theme-btn:hover { border-color: var(--text-3); }
  .theme-btn.active { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); }
  .theme-circle { width: 8px; height: 8px; border-radius: 50%; }

  .sep { color: var(--text-4); opacity: 0.2; }

  #theme-name { transition: color 0.3s; }
</style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">

  <div class="body" id="body">
    <div id="output"></div>
    <div class="input-area">
      <span class="input-prompt">fabricated ~ </span>

    </div>
  </div>

  <div class="statusbar">
    <div class="statusbar-left">
      <div class="status-item"><span class="status-dot status-dot-amber"></span> fabricated v1.0</div>
      <div class="status-item" id="status-theme">theme: amber</div>
    </div>
    <div class="statusbar-right">
      <div class="status-item"><span class="status-dot status-dot-teal"></span> connected</div>
      <div class="status-item">tab to autocomplete</div>

  </div>
</div>

  copper: { primary:'#B87333', secondary:'#5A8A8A', accent:'#D4A55A' },

let currentTheme = 'amber';
let lessonProgress = {};

function h(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  output.appendChild(div);
  scrollToBottom();
}

function addLine(text, cls='') {
  addHTML(`<div class="ln${cls?' '+cls:''}">${text}</div>`);
}

function addBlank() { addHTML('<div class="blank"></div>'); }

function scrollToBottom() {
  requestAnimationFrame(() => body.scrollTop = body.scrollHeight);
}

function showPromptEcho(cmd) {
  addLine(`<span class="prompt-text">fabricated ~ </span><span class="cmd-text">${h(cmd)}</span>`);
}

function cmdProjects(arg) {

function cmdProjectDetail(name) {
  const projects = {
    weather: {
      title: 'Weather Station', num: '01', color: 'hi', diff: 'Beginner', diffBars: '■ ■<span class="dim"> ■ ■ ■</span>',
      time: '~2 hours', board: 'Arduino Nano',
      parts: ['Arduino Nano (ATmega328P)','BME280 sensor (temp/humidity/pressure)','SSD1306 OLED display (128x64)','MicroSD card module + 8GB card','Half-size breadboard','Jumper wires (M-M, M-F)','USB-C cable','Laser-cut acrylic enclosure'],
      learns: ['I2C communication protocol','Reading environmental sensors','Driving OLED displays with U8g2','SD card data logging','Claude Code: generating display layouts','Battery power management']
    },
    midi: {
      title: 'MIDI Controller', num: '02', color: 'teal', diff: 'Intermediate', diffBars: '■ ■ ■<span class="dim"> ■ ■</span>',
      time: '~3 hours', board: 'Arduino Leonardo',
      parts: ['Arduino Leonardo (native USB-MIDI)','8x 10kΩ potentiometers','8x tactile push buttons','1x full-size breadboard','Jumper wires (assorted)','USB-C cable','Laser-cut wood enclosure','Rubber knob caps (8x)'],
      learns: ['Analog-to-digital conversion','Digital input debouncing','USB-MIDI protocol','Claude Code: generating MIDI mappings','Multiplexing inputs','Enclosure assembly & cable management']
    },
    led: {
      title: 'LED Installation', num: '03', color: 'copper', diff: 'Intermediate', diffBars: '■ ■ ■<span class="dim"> ■ ■</span>',
      time: '~3 hours', board: 'Arduino Uno',
      parts: ['Arduino Uno R3','WS2812B LED strip (60 LEDs/m, 1m)','MAX9814 microphone module','5V 3A power supply','Half-size breadboard','Jumper wires','470Ω resistor, 1000μF capacitor','3D-printed enclosure'],
      learns: ['Addressable LED protocols (WS2812)','FastLED library patterns','Audio sampling & FFT basics','Claude Code: designing light patterns','Power management for LEDs','Sound-reactive algorithms']
    }
  };

  const p = projects[name];
  if (!p) { addLine(`  <span class="err">Project not found. Try: weather, midi, led</span>`); addBlank(); return; }

  addBlank();
  addHTML(`<div class="box"><div class="box-header">${p.title} — Project ${p.num}</div><div class="box-body">
    <div class="tbl-row"><span class="tbl-key">  Difficulty</span><span class="tbl-val"><span class="${p.color}">${p.diffBars}</span>  ${p.diff}</span></div>
    <div class="tbl-row"><span class="tbl-key">  Build Time</span><span class="tbl-val">${p.time}</span></div>
    <div class="tbl-row"><span class="tbl-key">  Board</span><span class="tbl-val">${p.board}</span></div>
  </div></div>`);
  addBlank();
  addLine(`  <span class="bold">Parts List:</span>`);
  p.parts.forEach((part, i) => {
    const prefix = i < p.parts.length - 1 ? '├──' : '└──';
    addLine(`  <span class="out">${prefix} ${part}</span>`);
  });
  addBlank();
  addLine(`  <span class="bold">What You'll Learn:</span>`);
  p.learns.forEach((l, i) => {
    const prefix = i < p.learns.length - 1 ? '├──' : '└──';
    addLine(`  <span class="out">${prefix} ${l}</span>`);
  });
  addBlank();
}

    { title: 'Installing Claude Code', content: `  <span class="bold">Getting started is one command:</span>\n\n  <span class="dim">$</span> <span class="hi">npm install -g @anthropic-ai/claude-code</span>\n\n  Then in any project directory:\n\n  <span class="dim">$</span> <span class="hi">claude</span>\n\n  Claude will scan your project, understand the\n  structure, and start helping immediately.\n\n  For Arduino projects, it recognizes .ino files,\n  library dependencies, and board configurations.` },
  ],

    { title: 'Your First Circuit', content: `  <span class="bold">LED + Resistor — the simplest circuit.</span>\n\n  <span class="dim">  Arduino Pin 13</span>\n  <span class="hi">      │</span>\n  <span class="hi">     [R] 220Ω</span>\n  <span class="hi">      │</span>\n  <span class="hi">     [▽] LED (long leg = anode)</span>\n  <span class="hi">      │</span>\n  <span class="dim">     GND</span>\n\n  The resistor limits current so the LED doesn't\n  burn out. 220Ω is safe for most LEDs at 5V.\n\n  <span class="bold">Ohm's Law:</span> V = I × R\n  5V ÷ 220Ω ≈ 23mA (safe for standard LEDs)` },

function cmdLearn(args) {
  const parts = args.split(/\s+/);
  const module = parts[0];
  let lessonNum = 1;

  if (!module) {
    addBlank();
    addLine(`  <span class="bold">Available modules:</span>`);
    addBlank();
    addLine(`  <span class="hi">claude-code</span>   <span class="dim">2 lessons — AI pair programming for hardware</span>`);
    addLine(`  <span class="teal">arduino</span>       <span class="dim">3 lessons — The open-source hardware platform</span>`);
    addLine(`  <span class="copper">electronics</span>   <span class="dim">1 lesson  — Circuit fundamentals</span>`);
    addBlank();
    addLine(`  <span class="dim">Usage: </span><span class="teal">learn &lt;module&gt;</span><span class="dim"> or </span><span class="teal">learn &lt;module&gt; --lesson N</span>`);
    addBlank();
    return;
  }

  const lessons = LESSONS[module];
  if (!lessons) {
    addLine(`  <span class="err">Module not found. Available: claude-code, arduino, electronics</span>`);
    addBlank();
    return;
  }

  // Parse --lesson N or --next
  const lessonFlag = parts.indexOf('--lesson');
  const nextFlag = parts.indexOf('--next');
  const listFlag = parts.indexOf('--list');

  if (listFlag > -1) {
    addBlank();
    addLine(`  <span class="bold">${module} — ${lessons.length} lessons:</span>`);
    addBlank();
    lessons.forEach((l, i) => {
      const done = (lessonProgress[module] || 0) > i;
      const marker = done ? '<span class="ok">✓</span>' : '<span class="dim">○</span>';
      addLine(`  ${marker} <span class="out">${String(i+1).padStart(2,'0')}. ${l.title}</span>`);
    });
    addBlank();
    return;
  }

  if (nextFlag > -1) {
    lessonNum = (lessonProgress[module] || 0) + 1;
  } else if (lessonFlag > -1 && parts[lessonFlag + 1]) {
    lessonNum = parseInt(parts[lessonFlag + 1]) || 1;
  }

  if (lessonNum < 1 || lessonNum > lessons.length) {
    addLine(`  <span class="err">Lesson ${lessonNum} doesn't exist. Module has ${lessons.length} lessons.</span>`);
    addBlank();
    return;
  }

  const lesson = lessons[lessonNum - 1];
  lessonProgress[module] = lessonNum;

  addBlank();
  addHTML(`<div class="box"><div class="box-header">${module} — Lesson ${String(lessonNum).padStart(2,'0')}: ${lesson.title}</div><div class="box-body">${lesson.content.split('\n').map(l => `<div class="ln">${l}</div>`).join('')}</div></div>`);
  addBlank();

  const pct = Math.round((lessonNum / lessons.length) * 100);
  addHTML(`<div class="progress"><span class="progress-label">  Lesson ${lessonNum}/${lessons.length}</span><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-pct">${pct}%</span></div>`);
  addBlank();

  const hints = [];
  if (lessonNum < lessons.length) hints.push(`<span class="teal">learn ${module} --next</span><span class="dim"> to continue</span>`);
  hints.push(`<span class="teal">learn ${module} --list</span><span class="dim"> for all lessons</span>`);
  addLine(`  ${hints.join(' · ')}`);
  addBlank();
}

function cmdSignup() {
  addBlank();
  addLine(`  <span class="out">Get notified when registration opens.</span>`);
  addBlank();

  // Simulate interactive signup
  const email = prompt('Email:') || 'maker@example.com';
  const name = prompt('Your name:') || 'Maker';

  addLine(`  <span class="teal">Email:</span> <span class="cmd-text">${h(email)}</span>`);
  addLine(`  <span class="teal">Name:</span>  <span class="cmd-text">${h(name)}</span>`);
  addBlank();
  addLine(`  <span class="ok">✓ You're on the list, ${h(name.split(' ')[0])}. We'll email you when it's time.</span>`);
  addBlank();
}

function cmdTheme(name) {
  if (!name) {
    addBlank();
    addLine(`  <span class="out">Available themes:</span>`);
    addBlank();
    const themeHTML = Object.keys(THEMES).map(t => {
      const c = THEMES[t];
      const active = t === currentTheme ? ' active' : '';
      return `<button class="theme-btn${active}" onclick="execute('theme ${t}')"><div class="theme-circle" style="background:${c.primary};box-shadow:0 0 4px ${c.primary}80"></div>${t}</button>`;
    }).join('');
    addHTML(`<div class="themes">${themeHTML}</div>`);
    addBlank();
    addLine(`  <span class="dim">Usage: </span><span class="teal">theme &lt;name&gt;</span>`);
    addBlank();
    return;
  }

  if (!THEMES[name]) {
    addLine(`  <span class="err">Theme "${h(name)}" not found. Available: ${Object.keys(THEMES).join(', ')}</span>`);
    addBlank();
    return;
  }

  currentTheme = name;
  const t = THEMES[name];
  document.documentElement.style.setProperty('--primary', t.primary);
  document.documentElement.style.setProperty('--primary-dim', t.primary + '1f');
  document.documentElement.style.setProperty('--secondary', t.secondary);
  document.documentElement.style.setProperty('--accent', t.accent);

  document.getElementById('theme-dot').style.background = t.primary;
  document.getElementById('theme-dot').style.boxShadow = `0 0 4px ${t.primary}80`;
  document.getElementById('theme-name').textContent = name;
  document.getElementById('status-theme').textContent = `theme: ${name}`;

  addBlank();
  addLine(`  <span class="ok">✓ Theme switched to </span><span class="hi">${name}</span>`);
  addBlank();
}

function cmdClear() {
  output.innerHTML = '';
}

// === EXECUTE ===
function execute(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  history.push(trimmed);
  historyIdx = history.length;

  showPromptEcho(trimmed);

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');

  switch (cmd) {
    case 'about': cmdAbout(); break;
    case 'projects': cmdProjects(args.toLowerCase()); break;
    case 'help': cmdHelp(); break;
    case 'signup': cmdSignup(); break;
    case 'theme': cmdTheme(args.toLowerCase()); break;
    case 'clear': cmdClear(); break;
    case 'learn': cmdLearn(args.toLowerCase()); break;
    case 'exit':
      addBlank();
      addLine(`  <span class="dim">Nice try. There is no escape from hardware.</span>`);
      addBlank();
      break;
    default:
      addBlank();
      addLine(`  <span class="err">Command not found: ${h(cmd)}</span>`);
      addLine(`  <span class="dim">Type </span><span class="hi">help</span><span class="dim"> for available commands.</span>`);
      addBlank();
  }

  scrollToBottom();
}

// === INPUT HANDLING ===
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    execute(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; input.value = history[historyIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx < history.length - 1) { historyIdx++; input.value = history[historyIdx]; }
    else { historyIdx = history.length; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const val = input.value.toLowerCase();
    if (!val) return;
    const allCmds = [...COMMANDS, ...Object.keys(THEMES).map(t => 'theme ' + t)];
    const match = allCmds.find(c => c.startsWith(val));
    if (match) input.value = match;
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    cmdClear();
  }
});

// Keep focus on input
document.addEventListener('click', () => input.focus());

// Init
showWelcome();
input.focus();
</script>
